<div class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-slate-950 p-4">

  <div class="w-full max-w-md rounded-2xl bg-white shadow-2xl dark:bg-slate-900">

    <!-- Header -->
    <div class="border-b border-gray-200 px-6 py-5 dark:border-slate-700">

      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">
        Forgot Password
      </h2>

      <p class="mt-2 text-sm text-gray-500 dark:text-slate-400">
        Enter your registered email address and we'll send you a password reset link.
      </p>

    </div>

    <form [formGroup]="forgotForm"
          (ngSubmit)="sendResetLink()"
          class="space-y-6 p-6">

      <!-- Email -->

      <div>

        <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">
          Email Address
          <span class="text-red-500">*</span>
        </label>

        <input type="email"
               formControlName="email"
               placeholder="Enter your email"
               class="w-full rounded-xl border border-gray-300 px-4 py-3
                 focus:border-indigo-500
                 focus:ring-2
                 focus:ring-indigo-200
                 dark:border-slate-700
                 dark:bg-slate-800
                 dark:text-white">

        @if(submitted && f['email'].errors){

        <p class="mt-2 text-sm text-red-500">

          @if(f['email'].errors['required']){
          Email is required.
          }

          @if(f['email'].errors['email']){
          Enter a valid email address.
          }

        </p>

        }

      </div>

      <!-- Buttons -->

      <div class="flex gap-3">

        <button type="button"
                routerLink="/"
                class="flex-1 rounded-xl border border-gray-300 py-3 font-medium
                 hover:bg-gray-100
                 dark:border-slate-700
                 dark:text-white
                 dark:hover:bg-slate-800">

          Back to Login

        </button>

        <button type="submit"
                class="flex-1 rounded-xl bg-indigo-600 py-3 font-semibold
                 text-white transition hover:bg-indigo-700">

          Send Reset Link

        </button>

      </div>

    </form>

  </div>

</div>
