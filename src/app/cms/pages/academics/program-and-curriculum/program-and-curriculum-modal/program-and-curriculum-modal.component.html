<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">

  <div class="max-h-[95vh] w-full max-w-5xl overflow-y-auto rounded-2xl bg-white shadow-2xl dark:bg-slate-900">

    <!-- Header -->

    <div class="flex items-center justify-between border-b border-gray-200 p-6 dark:border-slate-700">

      <div>

        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">

          {{ isEditMode ? 'Update Program & Curriculum' : 'Create Program & Curriculum' }}

        </h2>

        <p class="mt-1 text-sm text-gray-500 dark:text-slate-400">

          Fill all required information.

        </p>

      </div>

      <button (click)="cancel()"
              class="rounded-lg p-2 text-gray-500 transition hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800">

        ✕

      </button>

    </div>

    <!-- Form -->

    <form [formGroup]="form"
          (ngSubmit)="submit()"
          class="space-y-6 p-6">

      <!-- Program Name -->

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Program Name <span class="text-red-500">*</span>

        </label>

        <input type="text"
               formControlName="programName"
               class="w-full rounded-xl border border-gray-300 bg-white p-3 outline-none transition focus:border-indigo-500 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

      </div>

      <!-- Type + Duration -->

      <div class="grid gap-6 md:grid-cols-2">

        <div>

          <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

            Program Type

          </label>

          <select formControlName="programType"
                  class="w-full rounded-xl border border-gray-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

            <option value="">

              Select Type

            </option>

            <option value="UG">

              Undergraduate

            </option>

            <option value="PG">

              Post Graduate

            </option>

            <option value="Integrated">

              Integrated

            </option>

            <option value="Diploma">

              Diploma

            </option>

            <option value="Certificate">

              Certificate

            </option>

          </select>

        </div>

        <div>

          <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

            Duration

          </label>

          <input formControlName="duration"
                 placeholder="Example : 5 Years"
                 class="w-full rounded-xl border border-gray-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

        </div>

      </div>

      <!-- Image Upload -->

      <div>

        <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

          Banner Image

        </label>

        <label class="flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-indigo-300 p-8 transition hover:border-indigo-500 dark:border-slate-700"
               [class.bg-indigo-50]="isDraggingImage"
               [class.dark:bg-slate-800]="isDraggingImage"
               (dragover)="allowDrop($event)"
               (dragenter)="imageDragEnter()"
               (dragleave)="imageDragLeave()"
               (drop)="onImageDrop($event)">

          <input hidden
                 type="file"
                 accept="image/*"
                 (change)="onImageSelected($event)">

          <svg class="mb-3 h-12 w-12 text-indigo-500"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               viewBox="0 0 24 24">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l-4-4m4 4l4-4" />

          </svg>

          <p class="font-semibold">

            Drag & Drop Image

          </p>

          <p class="text-sm text-gray-500">

            or click here

          </p>

        </label>

        @if(imagePreview){

        <img [src]="imagePreview"
             class="mt-4 h-48 rounded-xl border object-cover shadow">

        }

      </div>

      <!-- PDF Upload -->

      <div>

        <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

          Curriculum PDF

        </label>

        <label class="flex cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-emerald-300 p-8 transition hover:border-emerald-500 dark:border-slate-700"
               [class.bg-emerald-50]="isDraggingPdf"
               [class.dark:bg-slate-800]="isDraggingPdf"
               (dragover)="allowDrop($event)"
               (dragenter)="pdfDragEnter()"
               (dragleave)="pdfDragLeave()"
               (drop)="onPdfDrop($event)">

          <input hidden
                 type="file"
                 accept=".pdf"
                 (change)="onPdfSelected($event)">

          <svg class="mb-3 h-12 w-12 text-red-500"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               viewBox="0 0 24 24">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16" />

          </svg>

          <p class="font-semibold">

            Drag & Drop PDF

          </p>

          <p class="text-sm text-gray-500">

            or click here

          </p>

        </label>

        @if(pdfName){

        <div class="mt-4 rounded-xl border border-green-300 bg-green-50 p-4 text-green-700 dark:border-green-800 dark:bg-green-900/20 dark:text-green-400">

          📄 {{pdfName}}

        </div>

        }

      </div>

      <!-- Description -->

      <div>

        <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

          Description

        </label>

        <ckeditor [editor]="Editor"
                  formControlName="description">
        </ckeditor>

      </div>

      <!-- Order + Status -->

      <div class="grid gap-6 md:grid-cols-2">

        <div>

          <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

            Display Order

          </label>

          <input type="number"
                 formControlName="displayOrder"
                 class="w-full rounded-xl border border-gray-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

        </div>

      </div>

      <!-- Buttons -->

      <div class="flex justify-end gap-4 border-t border-gray-200 pt-6 dark:border-slate-700">

        <button type="button"
                (click)="cancel()"
                class="rounded-xl border border-gray-300 px-6 py-3 font-medium hover:bg-gray-100 dark:border-slate-700 dark:text-white dark:hover:bg-slate-800">

          Cancel

        </button>

        <button type="submit"
                class="rounded-xl bg-indigo-600 px-8 py-3 font-semibold text-white transition hover:bg-indigo-700">

          {{ isEditMode ? 'Update Program' : 'Create Program' }}

        </button>

      </div>

    </form>

  </div>

</div>
