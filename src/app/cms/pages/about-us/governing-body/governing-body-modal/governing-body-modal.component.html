<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">

  <div class="w-full max-w-3xl rounded-2xl border border-gray-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">

    <!-- Header -->

    <div class="flex items-center justify-between border-b border-gray-200 px-6 py-5 dark:border-slate-700">

      <h2 class="text-xl font-bold text-gray-800 dark:text-white">

        {{isEditMode ? 'Edit Governing Body Member' : 'Add Governing Body Member'}}

      </h2>

      <button (click)="cancel()"
              class="text-3xl text-gray-500 hover:text-red-500">

        ×

      </button>

    </div>

    <form [formGroup]="form"
          (ngSubmit)="submit()"
          class="space-y-6 p-6">

      <!-- Name -->

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Name

        </label>

        <input formControlName="Name"
               class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

      </div>

      <!-- Description -->

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Description

        </label>

        <textarea rows="5"
                  formControlName="Description"
                  class="w-full rounded-xl border border-gray-300 bg-white px-4 py-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">
                </textarea>

      </div>

      <!-- Upload -->

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Member Image

        </label>

        <div (dragover)="onDragOver($event)"
             (dragleave)="onDragLeave($event)"
             (drop)="onDrop($event)"
             class="rounded-xl border-2 border-dashed p-8 text-center transition"
             [ngClass]="dragging
                    ? 'border-indigo-500 bg-indigo-50 dark:bg-slate-800'
                    : 'border-gray-300 dark:border-slate-700'">

          <input hidden
                 #fileInput
                 type="file"
                 accept="image/*"
                 (change)="onFileChange($event)">

          <button type="button"
                  (click)="fileInput.click()"
                  class="rounded-lg bg-indigo-600 px-5 py-2 text-white">

            Select Image

          </button>

          <p class="mt-3 text-gray-500 dark:text-gray-400">

            or Drag & Drop Image Here

          </p>

        </div>

      </div>

      <!-- Preview -->
      @if(imagePreview){

      <div>

        <img [src]="imagePreview"
             class="h-52 rounded-xl border object-cover">

        <button type="button"
                (click)="removeImage()"
                class="mt-3 rounded-lg bg-red-600 px-4 py-2 text-white">

          Remove Image

        </button>

      </div>

      }

      <!-- Footer -->

      <div class="flex justify-end gap-3">

        <button type="button"
                (click)="cancel()"
                class="rounded-xl border border-gray-300 px-5 py-3 dark:border-slate-700 dark:text-white">

          Cancel

        </button>

        <button type="submit"
                class="rounded-xl bg-indigo-600 px-5 py-3 text-white hover:bg-indigo-700">

          {{isEditMode ? 'Update Member' : 'Create Member'}}

        </button>

      </div>

    </form>

  </div>

</div>
