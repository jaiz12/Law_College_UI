<form [formGroup]="pageForm"
      (ngSubmit)="save()"
      class="space-y-8">

  <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm
           dark:border-slate-700 dark:bg-slate-900">

    <div class="mb-8">

      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
        Vision & Mission
      </h1>

      <p class="mt-1 text-sm text-gray-500 dark:text-slate-400">
        Manage the Vision & Mission page content.
      </p>

    </div>

    <!-- Vision -->

    <div class="mb-8">

      <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

        Vision & Mission

      </label>

      <ckeditor [editor]="Editor"
                formControlName="description">
      </ckeditor>
      @if (
      pageForm.get('description')?.invalid &&
      pageForm.get('description')?.touched
      ) {

      <p class="mt-2 text-sm text-red-600">

        Vision &Aacute; Mission is required.

      </p>

      }
    </div>

    <!-- SEO -->

    <div class="grid gap-6 md:grid-cols-2">

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Meta Title

        </label>

        <input formControlName="metaTitle"
               class="w-full rounded-xl border border-gray-300 bg-white p-3
                 dark:border-slate-700
                 dark:bg-slate-800
                 dark:text-white">

      </div>

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Meta Description

        </label>

        <textarea rows="4"
                  formControlName="metaDescription"
                  class="w-full rounded-xl border border-gray-300 bg-white p-3
                 dark:border-slate-700
                 dark:bg-slate-800
                 dark:text-white">

        </textarea>

      </div>

    </div>

    <div class="mt-8 flex justify-end gap-4">

      <button type="reset"
              class="rounded-xl border border-gray-300 px-6 py-3 font-medium
                 text-gray-700
                 hover:bg-gray-100

                 dark:border-slate-700
                 dark:text-gray-300
                 dark:hover:bg-slate-800">

        Cancel

      </button>

      <button type="submit"
              class="rounded-xl bg-indigo-600 px-8 py-3 font-medium text-white
                 transition hover:bg-indigo-700">

        Save Page

      </button>

    </div>

  </div>

</form>
