<form [formGroup]="pageForm"
      (ngSubmit)="save()"
      class="space-y-8">

  <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm
           dark:border-slate-700 dark:bg-slate-900">

    <h1 class="mb-8 text-3xl font-bold text-gray-900 dark:text-white">

      Vision & Mission

    </h1>

    <!-- Banner Upload -->

    <div class="mb-8">

      <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

        Banner Image

      </label>

      <div (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave()"
           (drop)="onDrop($event)"
           class="cursor-pointer rounded-xl border-2 border-dashed p-8
               text-center transition"
           [ngClass]="{

        'border-indigo-600 bg-indigo-50 dark:bg-slate-800': dragging,

        'border-gray-300 dark:border-slate-700': !dragging

      }">

        <input hidden
               #banner
               type="file"
               accept="image/*"
               (change)="onFileSelected($event)">

        <button type="button"
                (click)="banner.click()"
                class="rounded-lg bg-indigo-600 px-5 py-2 text-white">

          Choose Banner

        </button>

        <p class="mt-4 text-gray-500 dark:text-gray-400">

          Drag & Drop image here

        </p>

      </div>

      @if(bannerPreview){

      <img [src]="bannerPreview"
           class="mt-5 h-60 w-full rounded-xl object-cover shadow">

      }

    </div>

    <!-- Vision -->

    <div class="mb-8">

      <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

        Vision

      </label>

      <ckeditor [editor]="Editor"
                formControlName="vision">

      </ckeditor>

    </div>

    <!-- Mission -->

    <div class="mb-8">

      <label class="mb-3 block font-medium text-gray-700 dark:text-gray-300">

        Mission

      </label>

      <ckeditor [editor]="Editor"
                formControlName="mission">

      </ckeditor>

    </div>

    <!-- SEO -->

    <div class="grid gap-6 md:grid-cols-2">

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Meta Title

        </label>

        <input formControlName="metaTitle"
               class="w-full rounded-xl border border-gray-300 bg-white p-3
                 dark:border-slate-700
                 dark:bg-slate-800
                 dark:text-white">

      </div>

      <div>

        <label class="mb-2 block font-medium text-gray-700 dark:text-gray-300">

          Meta Description

        </label>

        <textarea rows="4"
                  formControlName="metaDescription"
                  class="w-full rounded-xl border border-gray-300 bg-white p-3
                 dark:border-slate-700
                 dark:bg-slate-800
                 dark:text-white">

        </textarea>

      </div>

    </div>

    <div class="mt-8 flex justify-end gap-4">

      <button type="reset"
              class="rounded-xl border border-gray-300 px-6 py-3 font-medium
                 text-gray-700
                 hover:bg-gray-100

                 dark:border-slate-700
                 dark:text-gray-300
                 dark:hover:bg-slate-800">

        Cancel

      </button>

      <button type="submit"
              class="rounded-xl bg-indigo-600 px-8 py-3 font-medium text-white
                 transition hover:bg-indigo-700">

        Save Page

      </button>

    </div>

  </div>

</form>
