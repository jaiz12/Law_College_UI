<form [formGroup]="pageForm"
      (ngSubmit)="save()"
      class="space-y-6">

  <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm dark:border-slate-700 dark:bg-slate-900">

    <h2 class="mb-8 text-2xl font-bold text-gray-800 dark:text-white">

      Principal's Message

    </h2>

    <!-- Principal Image -->

    <div class="mb-8">

      <label class="mb-3 block font-semibold text-gray-700 dark:text-gray-200">

        Principal Image

      </label>

      <div (dragover)="onDragOver($event)"
           (dragleave)="onDragLeave($event)"
           (drop)="onDrop($event)"
           class="cursor-pointer rounded-xl border-2 border-dashed p-8 text-center transition"
           [class.border-indigo-500]="isDragging"
           [class.border-gray-300]="!isDragging"
           [class.dark:border-slate-600]="!isDragging">

        <input hidden
               #fileInput
               type="file"
               accept="image/*"
               (change)="onFileSelected($event)">

        <button type="button"
                (click)="fileInput.click()"
                class="rounded-lg bg-indigo-600 px-5 py-2 text-white hover:bg-indigo-700">

          Choose Image

        </button>

        <p class="mt-3 text-sm text-gray-500 dark:text-slate-400">

          Drag & Drop image here

        </p>

      </div>

      @if(imagePreview){

      <div class="mt-6">

        <img [src]="imagePreview"
             class="h-72 rounded-xl border object-cover shadow">

      </div>

      }

    </div>

    <!-- CK Editor -->

    <div class="mb-8">

      <label class="mb-3 block font-semibold text-gray-700 dark:text-gray-200">

        Principal's Message

      </label>

      <ckeditor [editor]="Editor"
                formControlName="description">

      </ckeditor>

    </div>

    <!-- SEO -->

    <div class="grid gap-6 md:grid-cols-2">

      <div>

        <label class="mb-2 block font-semibold text-gray-700 dark:text-gray-200">

          Meta Title

        </label>

        <input formControlName="metaTitle"
               class="w-full rounded-lg border border-gray-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

      </div>

      <div>

        <label class="mb-2 block font-semibold text-gray-700 dark:text-gray-200">

          Meta Description

        </label>

        <textarea rows="5"
                  formControlName="metaDescription"
                  class="w-full rounded-lg border border-gray-300 bg-white p-3 dark:border-slate-700 dark:bg-slate-800 dark:text-white">

        </textarea>

      </div>

    </div>

    <!-- Button -->

    <div class="mt-8 flex justify-end gap-4">

      <button type="reset"
              class="rounded-xl border border-gray-300 px-6 py-3 font-medium
             text-gray-700
             hover:bg-gray-100

             dark:border-slate-700
             dark:text-gray-300
             dark:hover:bg-slate-800">

        Cancel

      </button>

      <button type="submit"
              class="rounded-xl bg-indigo-600 px-8 py-3 font-medium text-white
             transition hover:bg-indigo-700">

        Save Page

      </button>

    </div>

  </div>

</form>
