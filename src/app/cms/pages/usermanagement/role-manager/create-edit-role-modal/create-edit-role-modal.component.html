<!-- Overlay -->

<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">

  <!-- Modal -->

  <div class="w-full max-w-lg rounded-2xl
                bg-white
                dark:bg-slate-900
                shadow-2xl
                border border-gray-200
                dark:border-slate-700">

    <!-- Header -->

    <div class="flex items-center justify-between
                    border-b
                    border-gray-200
                    dark:border-slate-700
                    px-6
                    py-5">

      <h2 class="text-xl font-bold
                       text-gray-800
                       dark:text-white">

        {{ isEditMode ? 'Edit Role' : 'Create Role' }}

      </h2>

      <button (click)="cancel()"
              class="text-gray-500 hover:text-red-500 text-2xl">

        ×

      </button>

    </div>

    <!-- Body -->

    <form [formGroup]="roleForm"
          (ngSubmit)="submit()"
          class="space-y-6 p-6">

      <!-- Role Name -->

      <div>

        <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">

          Role Name

        </label>

        <input type="text"
               formControlName="Name"
               placeholder="Enter role name"
               class="w-full rounded-xl border
                              border-gray-300
                              dark:border-slate-700
                              bg-white
                              dark:bg-slate-800
                              px-4
                              py-3
                              text-gray-800
                              dark:text-white
                              focus:border-indigo-500
                              outline-none">

        @if(roleForm.controls.Name.touched &&
        roleForm.controls.Name.invalid){

        <p class="mt-2 text-sm text-red-500">

          Role Name is required

        </p>

        }

      </div>
      <!-- Footer -->

      <div class="flex justify-end gap-3">

        <button type="button"
                (click)="cancel()"
                class="rounded-xl
                               border
                               border-gray-300
                               dark:border-slate-700
                               px-5
                               py-3
                               font-medium
                               text-gray-700
                               dark:text-gray-300
                               hover:bg-gray-100
                               dark:hover:bg-slate-800">

          Cancel

        </button>

        <button type="submit"
                class="rounded-xl
                               bg-indigo-600
                               px-5
                               py-3
                               font-medium
                               text-white
                               hover:bg-indigo-700">

          {{ isEditMode ? 'Update Role' : 'Create Role' }}

        </button>

      </div>

    </form>

  </div>

</div>
