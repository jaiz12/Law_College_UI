<header class="sticky top-0 z-40 h-20
border-b border-gray-200
bg-white
dark:bg-slate-900
dark:border-slate-700
transition-colors duration-300">

  <div class="flex h-full items-center justify-between px-6">
    <!-- Left -->
    <div class="flex items-center gap-5">
      <!-- Sidebar -->
      <button (click)="toggleSidebar();$event.stopPropagation()"
              class="flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 text-gray-500 hover:bg-gray-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors duration-300">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M0.583252 1C0.583252 0.585788 0.919038 0.25 1.33325 0.25H14.6666C15.0808 0.25 15.4166 0.585786 15.4166 1C15.4166 1.41421 15.0808 1.75 14.6666 1.75L1.33325 1.75C0.919038 1.75 0.583252 1.41422 0.583252 1ZM0.583252 11C0.583252 10.5858 0.919038 10.25 1.33325 10.25L14.6666 10.25C15.0808 10.25 15.4166 10.5858 15.4166 11C15.4166 11.4142 15.0808 11.75 14.6666 11.75L1.33325 11.75C0.919038 11.75 0.583252 11.4142 0.583252 11ZM1.33325 5.25C0.919038 5.25 0.583252 5.58579 0.583252 6C0.583252 6.41421 0.919038 6.75 1.33325 6.75L7.99992 6.75C8.41413 6.75 8.74992 6.41421 8.74992 6C8.74992 5.58579 8.41413 5.25 7.99992 5.25L1.33325 5.25Z" fill="currentColor"></path></svg>
       </button>
    </div>
    <!-- Right -->
    <div class="flex items-center gap-3">
      <!-- Dark -->
      <button (click)="toggleDarkMode()" class="flex h-10 w-10 items-center justify-center rounded-full text-gray-500 transition hover:bg-gray-100 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-800">
        <!-- Moon Icon (shown in light mode) -->
        

        <svg *ngIf="!layout.darkMode()" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17.4547 11.97L18.1799 12.1611C18.265 11.8383 18.1265 11.4982 17.8401 11.3266C17.5538 11.1551 17.1885 11.1934 16.944 11.4207L17.4547 11.97ZM8.0306 2.5459L8.57989 3.05657C8.80718 2.81209 8.84554 2.44682 8.67398 2.16046C8.50243 1.8741 8.16227 1.73559 7.83948 1.82066L8.0306 2.5459ZM12.9154 13.0035C9.64678 13.0035 6.99707 10.3538 6.99707 7.08524H5.49707C5.49707 11.1823 8.81835 14.5035 12.9154 14.5035V13.0035ZM16.944 11.4207C15.8869 12.4035 14.4721 13.0035 12.9154 13.0035V14.5035C14.8657 14.5035 16.6418 13.7499 17.9654 12.5193L16.944 11.4207ZM16.7295 11.7789C15.9437 14.7607 13.2277 16.9586 10.0003 16.9586V18.4586C13.9257 18.4586 17.2249 15.7853 18.1799 12.1611L16.7295 11.7789ZM10.0003 16.9586C6.15734 16.9586 3.04199 13.8433 3.04199 10.0003H1.54199C1.54199 14.6717 5.32892 18.4586 10.0003 18.4586V16.9586ZM3.04199 10.0003C3.04199 6.77289 5.23988 4.05695 8.22173 3.27114L7.83948 1.82066C4.21532 2.77574 1.54199 6.07486 1.54199 10.0003H3.04199ZM6.99707 7.08524C6.99707 5.52854 7.5971 4.11366 8.57989 3.05657L7.48132 2.03522C6.25073 3.35885 5.49707 5.13487 5.49707 7.08524H6.99707Z" fill="currentColor"></path></svg>
        <!-- Sun Icon (shown in dark mode) -->
        <svg *ngIf="layout.darkMode()" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd"
                clip-rule="evenodd"
                d="M10.0009 6.79327C8.22978 6.79327 6.79402 8.22904 6.79402 10.0001C6.79402 11.7712 8.22978 13.207 10.0009 13.207C11.772 13.207 13.2078 11.7712 13.2078 10.0001C13.2078 8.22904 11.772 6.79327 10.0009 6.79327Z"
                fill="currentColor" />

          <path d="M10 2V4M10 16V18M2 10H4M16 10H18M4.9 4.9L6.3 6.3M13.7 13.7L15.1 15.1M15.1 4.9L13.7 6.3M6.3 13.7L4.9 15.1"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round" />

        </svg>

      </button>

      <!-- Fullscreen -->

      <button (click)="toggleFullscreen()"
              class="hidden md:flex h-11 w-11 items-center justify-center
         rounded-full
         bg-white
         text-gray-600
         hover:bg-gray-100
         hover:text-indigo-600

         dark:bg-slate-900
         dark:border-slate-700
         dark:text-gray-300
         dark:hover:bg-slate-800
         dark:hover:text-indigo-400

         transition-all duration-300">

        @if(!isFullscreen()){
        <!-- Enter Fullscreen -->
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-5 h-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round" stroke-linejoin="round"
                d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3" />
        </svg>
        }

        @else {
        <!-- Exit Fullscreen -->
        <svg xmlns="http://www.w3.org/2000/svg"
             class="w-5 h-5"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">

          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 9H5V5M15 9h4V5M9 15H5v4M15 15h4v4" />
        </svg>
        }

      </button>

      <!-- Profile -->

      <div class="relative">

        <button (click)="toggleProfile(); $event.stopPropagation()"
                class="flex items-center gap-3 rounded-xl px-3 py-2

         bg-transparent

         hover:bg-gray-100
         dark:hover:bg-slate-800

         transition-all duration-300">

          <!-- Avatar -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="fill-gray-500 group-hover:fill-gray-700 dark:fill-gray-400 dark:group-hover:fill-gray-300"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 3.5C7.30558 3.5 3.5 7.30558 3.5 12C3.5 14.1526 4.3002 16.1184 5.61936 17.616C6.17279 15.3096 8.24852 13.5955 10.7246 13.5955H13.2746C15.7509 13.5955 17.8268 15.31 18.38 17.6167C19.6996 16.119 20.5 14.153 20.5 12C20.5 7.30558 16.6944 3.5 12 3.5ZM17.0246 18.8566V18.8455C17.0246 16.7744 15.3457 15.0955 13.2746 15.0955H10.7246C8.65354 15.0955 6.97461 16.7744 6.97461 18.8455V18.856C8.38223 19.8895 10.1198 20.5 12 20.5C13.8798 20.5 15.6171 19.8898 17.0246 18.8566ZM2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12ZM11.9991 7.25C10.8847 7.25 9.98126 8.15342 9.98126 9.26784C9.98126 10.3823 10.8847 11.2857 11.9991 11.2857C13.1135 11.2857 14.0169 10.3823 14.0169 9.26784C14.0169 8.15342 13.1135 7.25 11.9991 7.25ZM8.48126 9.26784C8.48126 7.32499 10.0563 5.75 11.9991 5.75C13.9419 5.75 15.5169 7.32499 15.5169 9.26784C15.5169 11.2107 13.9419 12.7857 11.9991 12.7857C10.0563 12.7857 8.48126 11.2107 8.48126 9.26784Z" fill=""></path></svg>


          <!-- User Info -->
          <div class="hidden lg:block text-left">

            <h5 class="text-sm font-semibold text-gray-800 dark:text-white">
              {{ user().userName }}
            </h5>

            <p class="text-xs text-gray-500 dark:text-gray-400">
              {{ user().roles.join(', ') }}
            </p>

          </div>

          <!-- Arrow -->
          <svg width="18"
               height="20"
               viewBox="0 0 18 20"
               fill="none"
               xmlns="http://www.w3.org/2000/svg"
               [ngClass]="{
      'rotate-180': profileMenu(),
      'rotate-0': !profileMenu(),
               'text-gray-800 dark:text-gray-200': profileMenu(),
    'text-gray-500 dark:text-gray-400': !profileMenu()
    }"
               class="stroke-gray-500 dark:stroke-gray-400 transition-transform duration-300">

            <path d="M4.3125 8.65625L9 13.3437L13.6875 8.65625"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round">
            </path>

          </svg>

        </button>

        @if(profileMenu()){

        <div class="absolute
              right-0
              z-40
              mt-2
              w-[260px]
              rounded-2xl
              border border-gray-200
              bg-white
              shadow-xl
              dark:bg-slate-900
              dark:border-slate-700
              transition-colors">
          <div class="px-3 py-2">
            <span class="block font-medium text-sm text-gray-700 dark:text-white"> {{ user().userName }} </span>
            <span class="mt-0.5 block  text-xs text-gray-500 dark:text-gray-400"> {{ user().email }} </span>
          </div>
          <a (click)="logout()" class="flex items-center gap-3 px-3 py-4 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300" href="/signin">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="fill-gray-500 group-hover:fill-gray-700 dark:group-hover:fill-gray-300"><path fill-rule="evenodd" clip-rule="evenodd" d="M15.1007 19.247C14.6865 19.247 14.3507 18.9112 14.3507 18.497L14.3507 14.245H12.8507V18.497C12.8507 19.7396 13.8581 20.747 15.1007 20.747H18.5007C19.7434 20.747 20.7507 19.7396 20.7507 18.497L20.7507 5.49609C20.7507 4.25345 19.7433 3.24609 18.5007 3.24609H15.1007C13.8581 3.24609 12.8507 4.25345 12.8507 5.49609V9.74501L14.3507 9.74501V5.49609C14.3507 5.08188 14.6865 4.74609 15.1007 4.74609L18.5007 4.74609C18.9149 4.74609 19.2507 5.08188 19.2507 5.49609L19.2507 18.497C19.2507 18.9112 18.9149 19.247 18.5007 19.247H15.1007ZM3.25073 11.9984C3.25073 12.2144 3.34204 12.4091 3.48817 12.546L8.09483 17.1556C8.38763 17.4485 8.86251 17.4487 9.15549 17.1559C9.44848 16.8631 9.44863 16.3882 9.15583 16.0952L5.81116 12.7484L16.0007 12.7484C16.4149 12.7484 16.7507 12.4127 16.7507 11.9984C16.7507 11.5842 16.4149 11.2484 16.0007 11.2484L5.81528 11.2484L9.15585 7.90554C9.44864 7.61255 9.44847 7.13767 9.15547 6.84488C8.86248 6.55209 8.3876 6.55226 8.09481 6.84525L3.52309 11.4202C3.35673 11.5577 3.25073 11.7657 3.25073 11.9984Z" fill=""></path></svg>
            Sign out
          </a>
        </div>
        }

      </div>

    </div>

  </div>

</header>
